name: frank_type

services:
  web:
    image: akitaonrails/frank_type:latest
    container_name: frank-type-web
    restart: always
    ports:
      - "127.0.0.1:3200:80"
    volumes:
      - /var/opt/docker/frank_type/storage:/rails/storage
    security_opt:
      - label:disable
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
