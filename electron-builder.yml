appId: com.franktype.app
productName: Frank Type
copyright: Copyright © 2025 AkitaOnRails

# Rails spawns subprocesses and reads the app tree directly, so we cannot
# ship the app inside an asar archive. Everything below is unpacked on disk
# in the installed app folder.
asar: false

directories:
  output: dist
  buildResources: build

files:
  - app/**/*
  - bin/**/*
  - config/**/*
  - db/**/*
  - lib/**/*
  - public/**/*
  - script/**/*
  - vendor/**/*
  - electron/**/*
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - config.ru
  - .ruby-version
  - package.json
  - "!**/*.map"
  - "!**/*.test.*"
  - "!test/**/*"
  - "!docs/**/*"
  - "!log/**/*"
  - "!tmp/**/*"
  - "!.git*"
  - "!Dockerfile*"
  - "!docker-compose*"
  - "!.dockerignore"
  - "!.github/**/*"
  - "!.kamal/**/*"
  - "!docker-bake*"
  - "!.bundle/**/*"
  - "!AGENTS.md"
  - "!CHANGELOG.md"
  - "!README.md"
  - "!LICENSE"
  - "!scripts/**/*"

# The bundled Windows Ruby runtime is downloaded to ./ruby by
# scripts/download-ruby.mjs and copied next to the app as an extra resource.
extraResources:
  - from: ruby
    to: ruby
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}-win.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: Frank Type
  createDesktopShortcut: true
