- id: carroll-alice-slow-1
  title: Alice's Adventures in Wonderland
  author: Lewis Carroll
  source: "Project Gutenberg ebook #11"
  source_url: https://www.gutenberg.org/ebooks/11
  text: >
    Alice was beginning to get very tired of sitting by her sister on the bank,
    and of having nothing to do. Once or twice she had peeped into the book her
    sister was reading, but it had no pictures or conversations in it. What is
    the use of a book, thought Alice, without pictures or conversations? So she
    was considering in her own mind whether the pleasure of making a daisy chain
    would be worth the trouble of getting up and picking the daisies.
- id: baum-oz-slow-1
  title: The Wonderful Wizard of Oz
  author: L. Frank Baum
  source: "Project Gutenberg ebook #55"
  source_url: https://www.gutenberg.org/ebooks/55
  text: >
    Dorothy lived in the midst of the great Kansas prairies, with Uncle Henry,
    who was a farmer, and Aunt Em, who was the farmer's wife. Their house was
    small, for the lumber to build it had to be carried by wagon many miles.
    There were four walls, a floor and a roof, which made one room, and this room
    contained a rusty looking cookstove, a cupboard for the dishes, a table,
    three or four chairs, and the beds.
- id: barrie-peter-pan-slow-1
  title: Peter Pan
  author: J. M. Barrie
  source: "Project Gutenberg ebook #16"
  source_url: https://www.gutenberg.org/ebooks/16
  text: >
    All children, except one, grow up. They soon know that they will grow up, and
    the way Wendy knew was this. One day when she was two years old she was
    playing in a garden, and she plucked another flower and ran with it to her
    mother. I suppose she must have looked rather delightful, for Mrs. Darling put
    her hand to her heart and cried that she wished Wendy would remain like this
    forever.
